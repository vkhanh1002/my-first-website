<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="../img/favicon.ico"
      type="image/x-icon"
      border-radius="50%"
    />
    <link rel="stylesheet" href="../style/style.css" />
    <link rel="stylesheet" href="../style/table.css" />

    <title>Giỏ Hàng</title>
  </head>

  <body>
    <header>
      <a
        href="../index.html"
        style="text-decoration-line: none"
        id="icon-header"
        class="header-inline"
      >
        <img src="../img/logo.ico" alt="Logo" width="100px" />
        <h1>Inkognito</h1>
      </a>
      <nav id="nav-header">
        <a href="../index.html"><p>Trang Chủ</p></a>
        <a href="../Sanpham/sanpham.html"><p>Sản Phẩm</p></a>
        <a href="../Giohang/index.html" class="active"><p>Giỏ Hàng</p></a>
        <a href="#"><p>Blog</p></a>
      </nav>
      <nav id="login" class="header-inline">
        <a href="../login/login.html">Đăng Nhập </a>
        <p>/</p>
        <a href="../login/login.html?action=register">Đăng Kí</a>
      </nav>
      <div id="nav-user-info">
        <div class="avatar" id="nav-avatar">U</div>
        <span class="username" id="nav-username">User</span>
        <button id="btn-logout" onclick="logout()">Đăng xuất</button>
      </div>
    </header>

    <div class="layout">
      <div class="banner-left">
        <img src="../img/mylove.jpg" alt="anhiu1" class="move-img" />
        <img src="../img/mylove1.jpg" alt="anhiu2" class="move-img" />
        <img src="../img/mlove2.jpg" alt="anhiu3" class="move-img" />
      </div>
      <div class="table-area">
        <div class="button-gr">
          <div id="button-mua">Mua</div>
          <div id="button-xoa">Xóa</div>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>STT</th>
                <th class="ten">Tên sách</th>
                <th>Số lượng</th>
                <th>Giá</th>
                <th>Chọn</th>
              </tr>
            </thead>
            <tbody id="list"></tbody>

            <tfoot>
              <tr>
                <td colspan="3">Tổng tiền:</td>
                <td colspan="2" id="total">0</td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>

      <div class="banner-right">
        <img src="../img/anhiu1.jpg" alt="" class="move-img" />
        <img src="../img/anhiu2.jpg" alt="" class="move-img" />
        <img src="../img/anhiu3.jpg" alt="" class="move-img" />
      </div>
    </div>

    <div id="qr-modal" class="hidden">
      <div class="qr-box">
        <h3>Thanh toán</h3>
        <div class="qr-img">
          <img src="../img/anhgif.gif" alt="" width="400px" />
          <img src="../img/qr.jpg" alt="QR thanh toán" width="400px" />
        </div>
        <p id="qr-money"></p>
        <button id="close-qr">Đóng</button>
      </div>
    </div>
    <footer>
      <h3>© Liên hệ:</h3>
      Địa chỉ: A2-613 Đại học Kinh tế Quốc dân<br />
      Email: cskh@inkognito.com.vn<br />
      Số điện thoại: 19001124
    </footer>
    <script src="../js/giohang.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const sess = JSON.parse(localStorage.getItem("bs_session") || "null");

        const guestArea = document.getElementById("login");
        const userInfo = document.getElementById("nav-user-info");
        if (sess && (!sess.exp || Date.now() < sess.exp)) {
          if (guestArea) guestArea.style.display = "none";
          if (userInfo) {
            userInfo.style.display = "flex"; // Hiện cụm Avatar + Tên
            document.getElementById("nav-avatar").textContent =
              sess.name[0].toUpperCase();
            document.getElementById("nav-username").textContent = sess.name
              .split(" ")
              .pop();
          }
        }
      });
      function logout() {
        localStorage.removeItem("bs_session");
        window.location.reload();
      }
    </script>
  </body>
</html>
